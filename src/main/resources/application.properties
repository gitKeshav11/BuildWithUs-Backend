server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/buildwithus_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

jwt.secret=YOUR_JWT_SECRET

groq.api.key=YOUR_GROQ_API_KEY
groq.model=llama-3.3-70b-versatile

# Backward-compatible AI keys used by AIService/AiController
ai.api.key=${groq.api.key}
ai.model=${groq.model}
ai.api.url=https://api.groq.com/openai/v1/chat/completions
